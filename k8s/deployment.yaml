apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpa-demo
  namespace: project-04-vpa
  labels:
    app.kubernetes.io/name: vpa-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: vpa-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vpa-demo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: cpu-worker
          image: registry.k8s.io/ubuntu-slim:0.14
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
          args:
            - -c
            - while true; do timeout 0.5s yes >/dev/null; sleep 0.5s; done
          resources:
            requests:
              cpu: 100m
              memory: 50Mi
            limits:
              cpu: "1"
              memory: 500Mi
